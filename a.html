<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نبذة تعريفية</title>

    <!-- خط عربي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Tajawal", sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 40px;
            width: 420px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .card h1 {
            margin-bottom: 10px;
            font-size: 26px;
            color: #ffd369;
        }

        .card hr {
            border: none;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
            margin: 15px 0 20px;
        }

        .info {
            font-size: 18px;
            line-height: 1.9;
        }

        .label {
            font-weight: bold;
            color: #aad8ff;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>نبذة تعريفية</h1>
        <hr>

        <div class="info">
            <p>
                <span class="label">الاسم:</span>
                محمد المصطفى عبدالرحمن
            </p>

            <p>
                <span class="label">الجامعة:</span>
                جامعة وادي النيل
            </p>

            <p>
                <span class="label">الكلية:</span>
                كلية علوم حاسوب وتقانة المعلومات
            </p>

            <p>
                <span class="label">التخصص:</span>
                نظم معلومات
            </p>
        </div>
    </div>

</body>
</html>
